name: Deploy Demo

on:
  push:
    branches:
      - main
      - hotfix/**
    paths:
      - 'demo/**'
      - '.github/workflows/demo-deploy.yml'
  workflow_dispatch: # Allows manual triggering

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Get yarn cache directory path
        id: yarn-cache-dir-path
        run: echo "dir=$(yarn cache dir)" >> $GITHUB_OUTPUT

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.yarn-cache-dir-path.outputs.dir }}
            **/node_modules
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install root dependencies
        run: yarn install --frozen-lockfile

      - name: Install demo dependencies
        run: yarn install --cwd demo

      - name: Build demo
        working-directory: ./demo
        env:
          NODE_OPTIONS: '--no-warnings --experimental-loader ts-node/esm'
        run: yarn expo export -p web

      - name: Verify build output
        run: |
          if [ ! -d "demo/dist" ]; then
            echo "Error: demo/dist directory does not exist"
            exit 1
          fi
          echo "Build output contents:"
          ls -la demo/dist/
          if [ ! -f "demo/dist/index.html" ]; then
            echo "Error: demo/dist/index.html does not exist"
            exit 1
          fi
          # Create .nojekyll file to prevent Jekyll processing
          touch demo/dist/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'demo/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4